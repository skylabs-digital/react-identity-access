# OSV-Scanner ignore configuration.
#
# This file enumerates advisories that cannot currently be remediated by a
# dependency upgrade. Every entry MUST include a `reason` and an `ignoreUntil`
# date so we revisit periodically.
#
# Most vulnerabilities flagged on this repo's lockfile are addressed via
# `resolutions` in package.json (and example/package.json). What remains
# below are advisories whose "fixed version" is either unreleased or
# requires a major-version bump out of scope for the security gate.

