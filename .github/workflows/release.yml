name: Release

# Thin caller — delegates the full FULL/REDUCED lib pipeline to the org
# reusable (skylabs-digital/.github/.github/workflows/lib-release.yml). The
# fork point (semantic-release publish on push-to-main only; ci + security on
# every PR) lives INSIDE the reusable. This file only declares triggers.
#
# Standard: docs/standards/cicd-unified-release.md (Variant C — library).
# Replaces the previously hand-rolled inline pipeline (test/release/publish-gpr
# jobs) AND the bespoke standalone security.yml — the org reusable wires the
# `security.yml@v1` gate (OSV + Gitleaks) into the pipeline so security now
# blocks release. `run-mutation: true` wires Stryker incremental into CI as a
# required check — closing the org-wide "Stryker-not-in-CI" lib gap.
#
# NOTE: requires skylabs-digital/.github PR #2 (org reusable) to be MERGED
# before this workflow can resolve `lib-release.yml@main`. Until then CI here
# will fail to start the `release` job — see the PR body.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'qa/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'tsconfig.json'
      - 'biome.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'stryker.conf.json'
      - '.releaserc.json'
      - '.nvmrc'
      - '.github/workflows/release.yml'
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    uses: skylabs-digital/.github/.github/workflows/lib-release.yml@main
    with:
      node-version: "24"
      build-tool: vite
      run-mutation: true
      coverage-floor: 90
    secrets: inherit
